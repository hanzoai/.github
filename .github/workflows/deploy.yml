name: Deploy Hanzo Services

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'services/**'
      - 'cloud/**'
      - 'chat/**'
      - 'iam/**'
      - 'router/**'
      - 'search/**'
      - '.github/workflows/deploy.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/hanzoai

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            iam:
              - 'iam/**'
            cloud:
              - 'cloud/**'
            chat:
              - 'chat/**'
            router:
              - 'router/**'
            search:
              - 'search/**'

  build-and-push:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ENVIRONMENT=production" >> $GITHUB_OUTPUT
            echo "TAG_SUFFIX=" >> $GITHUB_OUTPUT
          else
            echo "ENVIRONMENT=staging" >> $GITHUB_OUTPUT
            echo "TAG_SUFFIX=-dev" >> $GITHUB_OUTPUT
          fi
          echo "DATE_TAG=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
      
      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest${{ steps.env.outputs.TAG_SUFFIX }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ steps.env.outputs.DATE_TAG }}${{ steps.env.outputs.TAG_SUFFIX }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ENVIRONMENT=${{ steps.env.outputs.ENVIRONMENT }}

  deploy:
    needs: [detect-changes, build-and-push]
    if: ${{ needs.detect-changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ENVIRONMENT=production" >> $GITHUB_OUTPUT
            echo "DEPLOY_HOST=${{ secrets.PRODUCTION_HOST }}" >> $GITHUB_OUTPUT
            echo "DEPLOY_KEY=${{ secrets.PRODUCTION_DEPLOY_KEY }}" >> $GITHUB_OUTPUT
            echo "DOMAIN_SUFFIX=.hanzo.ai" >> $GITHUB_OUTPUT
          else
            echo "ENVIRONMENT=staging" >> $GITHUB_OUTPUT
            echo "DEPLOY_HOST=${{ secrets.STAGING_HOST }}" >> $GITHUB_OUTPUT
            echo "DEPLOY_KEY=${{ secrets.STAGING_DEPLOY_KEY }}" >> $GITHUB_OUTPUT
            echo "DOMAIN_SUFFIX=.dev.hanzo.ai" >> $GITHUB_OUTPUT
          fi
      
      - name: Deploy to ${{ steps.env.outputs.ENVIRONMENT }}
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ steps.env.outputs.DEPLOY_HOST }}
          username: deploy
          key: ${{ steps.env.outputs.DEPLOY_KEY }}
          script: |
            cd /opt/hanzo
            git pull origin ${{ github.ref_name }}
            
            # Update images for changed services
            SERVICES="${{ join(fromJson(needs.detect-changes.outputs.services), ' ') }}"
            for service in $SERVICES; do
              docker pull ${{ env.IMAGE_PREFIX }}/$service:latest${{ steps.env.outputs.TAG_SUFFIX }}
            done
            
            # Deploy with environment-specific compose file
            if [[ "${{ steps.env.outputs.ENVIRONMENT }}" == "production" ]]; then
              docker compose -f docker-compose.prod.yml up -d $SERVICES
            else
              docker compose -f docker-compose.staging.yml up -d $SERVICES
            fi
            
            # Run migrations if needed
            if [[ " $SERVICES " =~ " cloud " ]]; then
              docker compose exec cloud pnpm run db:migrate
            fi

  notify:
    needs: [deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Deployment to ${{ github.ref == 'refs/heads/main' && 'Production' || 'Staging' }}
            Services: ${{ join(fromJson(needs.detect-changes.outputs.services), ', ') }}
            Status: ${{ job.status }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        if: ${{ secrets.SLACK_WEBHOOK != '' }}