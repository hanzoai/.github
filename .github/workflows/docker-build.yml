name: Docker Build & Push (Reusable)

# Reusable workflow for native multi-arch Docker builds.
# No QEMU — native amd64 + arm64 runners.
#
# Changes:
#   - REMOVED CACHE_BUST=${{ github.sha }} (was invalidating all layer caching)
#   - Normalized arm64 Buildx driver to match amd64 (docker-container + network=host)
#   - Fixed single-arch deploy path (tag-single-arch job)
#   - Deploy job uses always() to handle both multi-arch and single-arch paths
#
# Usage in any repo:
#
#   jobs:
#     docker:
#       uses: hanzoai/.github/.github/workflows/docker-build.yml@main
#       with:
#         image: ghcr.io/hanzoai/myservice
#       secrets: inherit

on:
  workflow_call:
    inputs:
      image:
        description: "Full image name (e.g. ghcr.io/hanzoai/bot)"
        required: true
        type: string
      context:
        description: "Docker build context"
        default: "."
        type: string
      dockerfile:
        description: "Dockerfile path relative to context"
        default: "Dockerfile"
        type: string
      build-args:
        description: "Docker build args (multiline KEY=VALUE)"
        default: ""
        type: string
      target:
        description: "Docker build target stage"
        default: ""
        type: string
      platforms:
        description: "Comma-separated platforms to build"
        default: "linux/amd64,linux/arm64"
        type: string
      push:
        description: "Push images to registry"
        default: true
        type: boolean
      deploy:
        description: "Deploy after build (kubectl rollout restart)"
        default: false
        type: boolean
      deploy-deployment:
        description: "K8s deployment name for rollout restart"
        default: ""
        type: string
      deploy-namespace:
        description: "K8s namespace for deployment"
        default: "hanzo"
        type: string
      deploy-timeout:
        description: "Rollout status timeout"
        default: "300s"
        type: string
      tag-suffix:
        description: "Extra suffix for tags (e.g. -slim)"
        default: ""
        type: string
      cache-key:
        description: "Registry cache key prefix (defaults to image name)"
        default: ""
        type: string
      runner-amd64:
        description: "Runner label for amd64 builds"
        default: "hanzo-build"
        type: string
      runner-arm64:
        description: "Runner label for arm64 builds"
        default: "hanzo-build-arm64"
        type: string
      runner-deploy:
        description: "Runner label for deploy jobs"
        default: "hanzo-k8s"
        type: string

    outputs:
      amd64-digest:
        description: "amd64 image digest"
        value: ${{ jobs.build-amd64.outputs.digest }}
      arm64-digest:
        description: "arm64 image digest"
        value: ${{ jobs.build-arm64.outputs.digest }}
      manifest-tags:
        description: "Final manifest tags (JSON)"
        value: ${{ jobs.create-manifest.outputs.tags }}

env:
  REGISTRY: ghcr.io

jobs:
  # ── amd64 (ARC runner on hanzo-k8s) ──────────────────────────
  build-amd64:
    if: contains(inputs.platforms, 'linux/amd64')
    runs-on: ${{ inputs.runner-amd64 }}
    permissions:
      packages: write
      contents: read
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: |
            network=host

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image }}
          tags: |
            type=semver,pattern={{version}},suffix=-amd64${{ inputs.tag-suffix }}
            type=ref,event=branch,suffix=-amd64${{ inputs.tag-suffix }}
            type=ref,event=pr,suffix=-amd64${{ inputs.tag-suffix }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          platforms: linux/amd64
          build-args: ${{ inputs.build-args }}
          target: ${{ inputs.target || '' }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ inputs.cache-key || inputs.image }}-cache:amd64
          cache-to: type=registry,ref=${{ inputs.cache-key || inputs.image }}-cache:amd64,mode=max
          provenance: false
          push: ${{ inputs.push }}

  # ── arm64 (native Graviton on AWS EC2) ───────────────────────
  build-arm64:
    if: contains(inputs.platforms, 'linux/arm64')
    runs-on: ${{ inputs.runner-arm64 }}
    permissions:
      packages: write
      contents: read
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: |
            network=host

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image }}
          tags: |
            type=semver,pattern={{version}},suffix=-arm64${{ inputs.tag-suffix }}
            type=ref,event=branch,suffix=-arm64${{ inputs.tag-suffix }}
            type=ref,event=pr,suffix=-arm64${{ inputs.tag-suffix }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          platforms: linux/arm64
          build-args: ${{ inputs.build-args }}
          target: ${{ inputs.target || '' }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=${{ inputs.cache-key || inputs.image }}-cache:arm64
          cache-to: type=registry,ref=${{ inputs.cache-key || inputs.image }}-cache:arm64,mode=max
          provenance: false
          push: ${{ inputs.push }}

  # ── Multi-platform manifest (both platforms) ─────────────────
  create-manifest:
    if: inputs.push && contains(inputs.platforms, 'linux/amd64') && contains(inputs.platforms, 'linux/arm64')
    runs-on: ${{ inputs.runner-amd64 }}
    needs: [build-amd64, build-arm64]
    permissions:
      packages: write
      contents: read
    outputs:
      tags: ${{ steps.meta.outputs.json }}
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Create and push manifest
        run: |
          IMAGE="${{ inputs.image }}"
          AMD64_DIGEST="${{ needs.build-amd64.outputs.digest }}"
          ARM64_DIGEST="${{ needs.build-arm64.outputs.digest }}"
          echo "Creating manifest for ${IMAGE}"
          echo "  amd64: ${AMD64_DIGEST}"
          echo "  arm64: ${ARM64_DIGEST}"
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            "${IMAGE}@${AMD64_DIGEST}" \
            "${IMAGE}@${ARM64_DIGEST}"
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}

  # ── Tag single-arch image (when only one platform is built) ──
  #
  # When only amd64 OR arm64 is requested, create-manifest is
  # skipped (it requires both). This job ensures the arch-specific
  # image still gets tagged as :latest / :main / :vX.Y.Z.
  #
  tag-single-arch:
    if: >-
      inputs.push &&
      !(contains(inputs.platforms, 'linux/amd64') && contains(inputs.platforms, 'linux/arm64'))
    runs-on: ${{ inputs.runner-amd64 }}
    needs: [build-amd64, build-arm64]
    permissions:
      packages: write
      contents: read
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Tag single-arch image
        run: |
          IMAGE="${{ inputs.image }}"
          # Use whichever arch digest is available
          AMD64="${{ needs.build-amd64.outputs.digest }}"
          ARM64="${{ needs.build-arm64.outputs.digest }}"
          DIGEST="${AMD64:-$ARM64}"
          echo "Tagging single-arch image ${IMAGE}@${DIGEST}"
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            "${IMAGE}@${DIGEST}"
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}

  # ── Deploy (optional) ────────────────────────────────────────
  #
  # Depends on BOTH create-manifest and tag-single-arch.
  # Exactly one of them will run (multi-arch vs single-arch);
  # the other is skipped. We use always() so a skipped dependency
  # does not auto-skip deploy, then explicitly check that at least
  # one tagging path succeeded and nothing failed or was cancelled.
  #
  deploy:
    if: >-
      always() &&
      (needs.create-manifest.result == 'success' || needs.tag-single-arch.result == 'success') &&
      !(needs.create-manifest.result == 'failure' || needs.tag-single-arch.result == 'failure') &&
      inputs.deploy && github.ref == 'refs/heads/main'
    runs-on: ${{ inputs.runner-deploy }}
    needs: [create-manifest, tag-single-arch]
    environment: production
    steps:
      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          echo "${PWD}" >> "$GITHUB_PATH"

      - name: Deploy
        run: |
          echo "Deploying ${{ inputs.deploy-deployment }} in namespace ${{ inputs.deploy-namespace }}"
          kubectl rollout restart deployment/${{ inputs.deploy-deployment }} \
            -n ${{ inputs.deploy-namespace }}
          kubectl rollout status deployment/${{ inputs.deploy-deployment }} \
            -n ${{ inputs.deploy-namespace }} \
            --timeout=${{ inputs.deploy-timeout }}
          echo "Deploy complete: ${{ inputs.deploy-deployment }} restarted"
