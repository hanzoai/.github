name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        type: choice
        options:
          - llm-gateway
          - chat
          - search
          - platform
          - agent
          - mcp
          - all
      version:
        description: 'Version to deploy (leave empty for latest)'
        required: false
        type: string
      strategy:
        description: 'Deployment strategy'
        required: true
        type: choice
        options:
          - blue-green
          - canary
          - rolling
        default: blue-green
      rollback:
        description: 'Rollback to previous version'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  NAMESPACE: hanzo-production
  CLUSTER_NAME: hanzo-prod
  REGION: us-west-2

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.parse.outputs.services }}
      version: ${{ steps.version.outputs.version }}
      previous_version: ${{ steps.version.outputs.previous_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse services
        id: parse
        run: |
          if [ "${{ inputs.service }}" = "all" ]; then
            echo "services=[\"llm-gateway\",\"chat\",\"search\",\"platform\",\"agent\",\"mcp\"]" >> $GITHUB_OUTPUT
          else
            echo "services=[\"${{ inputs.service }}\"]" >> $GITHUB_OUTPUT
          fi

      - name: Determine version
        id: version
        run: |
          if [ -z "${{ inputs.version }}" ]; then
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "latest")
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Get previous version for rollback
          PREVIOUS=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "previous")
          echo "previous_version=$PREVIOUS" >> $GITHUB_OUTPUT

  validate:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        service: ${{ fromJSON(needs.prepare.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.REGION }}

      - name: Validate deployment manifest
        run: |
          helm lint ./k8s/charts/${{ matrix.service }}
          helm template ${{ matrix.service }} ./k8s/charts/${{ matrix.service }} \
            --namespace ${{ env.NAMESPACE }} \
            --values ./k8s/charts/${{ matrix.service }}/values.prod.yaml \
            --set image.tag=${{ needs.prepare.outputs.version }} \
            | kubectl apply --dry-run=client -f -

      - name: Check image exists
        run: |
          docker manifest inspect ${{ env.REGISTRY }}/hanzoai/${{ matrix.service }}:${{ needs.prepare.outputs.version }} || \
          (echo "Image not found" && exit 1)

  deploy-blue-green:
    runs-on: ubuntu-latest
    needs: [prepare, validate]
    if: inputs.strategy == 'blue-green' && !inputs.rollback
    strategy:
      matrix:
        service: ${{ fromJSON(needs.prepare.outputs.services) }}
      max-parallel: 1
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.REGION }}

      - name: Deploy to Green environment
        run: |
          # Deploy to green environment
          helm upgrade --install ${{ matrix.service }}-green ./k8s/charts/${{ matrix.service }} \
            --namespace ${{ env.NAMESPACE }} \
            --values ./k8s/charts/${{ matrix.service }}/values.prod.yaml \
            --set image.tag=${{ needs.prepare.outputs.version }} \
            --set blueGreen.productionSlot=green \
            --set blueGreen.enabled=true \
            --wait --timeout=10m

      - name: Run smoke tests
        run: |
          # Wait for deployment to be ready
          kubectl wait --for=condition=available --timeout=300s \
            deployment/${{ matrix.service }}-green \
            -n ${{ env.NAMESPACE }}

          # Run smoke tests
          SERVICE_URL=$(kubectl get service ${{ matrix.service }}-green \
            -n ${{ env.NAMESPACE }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

          ./scripts/smoke-test.sh $SERVICE_URL ${{ matrix.service }}

      - name: Switch traffic to Green
        run: |
          # Update service selector to point to green deployment
          kubectl patch service ${{ matrix.service }} \
            -n ${{ env.NAMESPACE }} \
            -p '{"spec":{"selector":{"slot":"green"}}}'

          # Wait for traffic switch
          sleep 30

          # Verify traffic is routing correctly
          ./scripts/verify-traffic.sh ${{ matrix.service }}

      - name: Scale down Blue deployment
        run: |
          # Keep blue deployment for quick rollback but scale to 0
          kubectl scale deployment ${{ matrix.service }}-blue \
            -n ${{ env.NAMESPACE }} \
            --replicas=0 || true

      - name: Tag Blue as previous version
        run: |
          kubectl annotate deployment ${{ matrix.service }}-blue \
            -n ${{ env.NAMESPACE }} \
            previous-version=${{ needs.prepare.outputs.previous_version }} \
            --overwrite || true

  deploy-canary:
    runs-on: ubuntu-latest
    needs: [prepare, validate]
    if: inputs.strategy == 'canary' && !inputs.rollback
    strategy:
      matrix:
        service: ${{ fromJSON(needs.prepare.outputs.services) }}
      max-parallel: 1
    steps:
      - uses: actions/checkout@v4

      - name: Setup tools
        run: |
          # Install Flagger for canary deployments
          kubectl apply -k github.com/fluxcd/flagger//kustomize/istio

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.REGION }}

      - name: Deploy Canary
        run: |
          helm upgrade --install ${{ matrix.service }} ./k8s/charts/${{ matrix.service }} \
            --namespace ${{ env.NAMESPACE }} \
            --values ./k8s/charts/${{ matrix.service }}/values.prod.yaml \
            --set image.tag=${{ needs.prepare.outputs.version }} \
            --set canary.enabled=true \
            --set canary.weight=10 \
            --wait --timeout=10m

      - name: Progressive traffic shift
        run: |
          # Gradually increase canary traffic
          for weight in 25 50 75 100; do
            echo "Setting canary weight to $weight%"
            kubectl patch canary ${{ matrix.service }} \
              -n ${{ env.NAMESPACE }} \
              --type='json' \
              -p='[{"op": "replace", "path": "/spec/service/trafficPolicy/weight", "value":'$weight'}]'

            # Wait and monitor metrics
            sleep 60

            # Check error rate
            ERROR_RATE=$(./scripts/check-metrics.sh ${{ matrix.service }} error-rate)
            if (( $(echo "$ERROR_RATE > 1" | bc -l) )); then
              echo "Error rate too high: $ERROR_RATE%"
              exit 1
            fi

            # Check latency
            P99_LATENCY=$(./scripts/check-metrics.sh ${{ matrix.service }} p99-latency)
            if (( $(echo "$P99_LATENCY > 1000" | bc -l) )); then
              echo "P99 latency too high: ${P99_LATENCY}ms"
              exit 1
            fi
          done

      - name: Promote canary
        run: |
          kubectl patch canary ${{ matrix.service }} \
            -n ${{ env.NAMESPACE }} \
            --type='json' \
            -p='[{"op": "replace", "path": "/spec/skipAnalysis", "value":true}]'

  deploy-rolling:
    runs-on: ubuntu-latest
    needs: [prepare, validate]
    if: inputs.strategy == 'rolling' && !inputs.rollback
    strategy:
      matrix:
        service: ${{ fromJSON(needs.prepare.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.REGION }}

      - name: Rolling update
        run: |
          kubectl set image deployment/${{ matrix.service }} \
            ${{ matrix.service }}=${{ env.REGISTRY }}/hanzoai/${{ matrix.service }}:${{ needs.prepare.outputs.version }} \
            -n ${{ env.NAMESPACE }} \
            --record

      - name: Monitor rollout
        run: |
          kubectl rollout status deployment/${{ matrix.service }} \
            -n ${{ env.NAMESPACE }} \
            --timeout=600s

      - name: Verify deployment
        run: |
          kubectl get pods -l app=${{ matrix.service }} \
            -n ${{ env.NAMESPACE }}

          # Run health checks
          ./scripts/health-check.sh ${{ matrix.service }}

  rollback:
    runs-on: ubuntu-latest
    needs: prepare
    if: inputs.rollback
    strategy:
      matrix:
        service: ${{ fromJSON(needs.prepare.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.REGION }}

      - name: Rollback deployment
        run: |
          if [ "${{ inputs.strategy }}" = "blue-green" ]; then
            # Switch traffic back to blue
            kubectl patch service ${{ matrix.service }} \
              -n ${{ env.NAMESPACE }} \
              -p '{"spec":{"selector":{"slot":"blue"}}}'

            # Scale up blue deployment
            kubectl scale deployment ${{ matrix.service }}-blue \
              -n ${{ env.NAMESPACE }} \
              --replicas=3
          else
            # Standard rollback
            kubectl rollout undo deployment/${{ matrix.service }} \
              -n ${{ env.NAMESPACE }}

            kubectl rollout status deployment/${{ matrix.service }} \
              -n ${{ env.NAMESPACE }}
          fi

      - name: Verify rollback
        run: |
          ./scripts/health-check.sh ${{ matrix.service }}

  post-deploy:
    runs-on: ubuntu-latest
    needs: [deploy-blue-green, deploy-canary, deploy-rolling]
    if: always() && !inputs.rollback
    steps:
      - uses: actions/checkout@v4

      - name: Run integration tests
        run: |
          ./scripts/integration-tests.sh production

      - name: Update monitoring dashboards
        run: |
          ./scripts/update-dashboards.sh ${{ needs.prepare.outputs.version }}

      - name: Send deployment notification
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              attachments: [{
                color: '${{ job.status == 'success' && 'good' || 'danger' }}',
                title: 'Production Deployment ${{ job.status }}',
                fields: [
                  { title: 'Service', value: '${{ inputs.service }}', short: true },
                  { title: 'Version', value: '${{ needs.prepare.outputs.version }}', short: true },
                  { title: 'Strategy', value: '${{ inputs.strategy }}', short: true },
                  { title: 'Status', value: '${{ job.status }}', short: true }
                ]
              }]
            }
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

      - name: Create deployment record
        run: |
          echo '{
            "service": "${{ inputs.service }}",
            "version": "${{ needs.prepare.outputs.version }}",
            "strategy": "${{ inputs.strategy }}",
            "timestamp": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'",
            "status": "${{ job.status }}",
            "deployed_by": "${{ github.actor }}"
          }' > deployment-record.json

          # Store in S3 for audit
          aws s3 cp deployment-record.json \
            s3://hanzo-deployments/$(date +%Y/%m/%d)/${{ github.run_id }}.json