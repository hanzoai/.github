name: Reusable Go CI/CD

on:
  workflow_call:
    inputs:
      go-version:
        description: 'Go version to use'
        required: false
        type: string
        default: '1.22'
      working-directory:
        description: 'Working directory for the job'
        required: true
        type: string
      run-tests:
        description: 'Whether to run tests'
        required: false
        type: boolean
        default: true
      run-integration-tests:
        description: 'Whether to run integration tests'
        required: false
        type: boolean
        default: false
      build-docker:
        description: 'Whether to build Docker image'
        required: false
        type: boolean
        default: true
      package-name:
        description: 'Package name for deployment'
        required: false
        type: string
      use-luxfi:
        description: 'Whether to use luxfi packages instead of go-ethereum'
        required: false
        type: boolean
        default: true
    secrets:
      SONAR_TOKEN:
        required: false

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      - name: Install tools
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install github.com/nishanths/exhaustive/cmd/exhaustive@latest

      - name: Verify dependencies
        run: |
          go mod verify
          go mod tidy
          if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
            echo "go.mod or go.sum is not tidy"
            exit 1
          fi

      - name: Check luxfi packages usage
        if: inputs.use-luxfi
        run: |
          if grep -r "github.com/ethereum/go-ethereum" go.mod; then
            echo "Error: Found go-ethereum import, should use luxfi/geth"
            exit 1
          fi
          if grep -r "github.com/ava-labs" go.mod; then
            echo "Error: Found ava-labs import, should use luxfi packages"
            exit 1
          fi

      - name: Run go fmt
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go code is not formatted"
            gofmt -d .
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run staticcheck
        run: staticcheck ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ${{ inputs.working-directory }}
          args: --timeout=10m

      - name: Run gosec security scan
        run: gosec -fmt sarif -out gosec-results.sarif ./... || true

      - name: Upload gosec results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ inputs.working-directory }}/gosec-results.sarif

      - name: Run vulnerability check
        run: govulncheck ./...

      - name: Run exhaustive check
        run: exhaustive ./... || true

  test:
    runs-on: ubuntu-latest
    if: inputs.run-tests
    needs: quality
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Run unit tests
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -html=coverage.out -o coverage.html

      - name: Run integration tests
        if: inputs.run-integration-tests
        run: |
          go test -v -race -tags=integration ./... -coverprofile=coverage-integration.out -covermode=atomic

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ${{ inputs.working-directory }}/coverage.out
          flags: ${{ inputs.package-name || 'go' }}
          name: ${{ inputs.package-name || 'go' }}

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage-${{ inputs.package-name || 'go' }}
          path: |
            ${{ inputs.working-directory }}/coverage.html
            ${{ inputs.working-directory }}/coverage.out
          retention-days: 30

      - name: SonarCloud Scan
        if: secrets.SONAR_TOKEN != ''
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ${{ inputs.working-directory }}

  benchmark:
    runs-on: ubuntu-latest
    needs: quality
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          cache: true

      - name: Run benchmarks
        run: |
          go test -bench=. -benchmem -run=^$ ./... | tee benchmark.txt

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Go Benchmark
          tool: 'go'
          output-file-path: ${{ inputs.working-directory }}/benchmark.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true

  fuzz:
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[fuzz]')
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}

      - name: Run fuzz tests
        run: |
          # Run fuzz tests for 1 minute each
          for dir in $(find . -name '*_test.go' -exec grep -l "func Fuzz" {} \; | xargs -n1 dirname | sort -u); do
            echo "Fuzzing in $dir"
            (cd "$dir" && go test -fuzz=. -fuzztime=1m || true)
          done

  build:
    runs-on: ubuntu-latest
    needs: [quality, test]
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          output_name="${{ inputs.package-name || 'app' }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            output_name="${output_name}.exe"
          fi
          go build -v -ldflags="-s -w -X main.version=$(git describe --tags --always) -X main.commit=$(git rev-parse HEAD) -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -o "${output_name}" ./...

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ inputs.package-name || 'go' }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            ${{ inputs.working-directory }}/${{ inputs.package-name || 'app' }}*
          retention-days: 30

  docker:
    runs-on: ubuntu-latest
    if: inputs.build-docker
    needs: [build]
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/hanzoai/${{ inputs.package-name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.working-directory }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GO_VERSION=${{ inputs.go-version }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/hanzoai/${{ inputs.package-name }}:${{ steps.meta.outputs.version }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'