name: Release Management

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
      prerelease_id:
        description: 'Prerelease identifier (alpha, beta, rc)'
        required: false
        type: string
        default: 'alpha'

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
      release_notes: ${{ steps.notes.outputs.release_notes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install -g semantic-release @semantic-release/git @semantic-release/changelog
          npm install -g conventional-changelog-cli
          npm install -g standard-version

      - name: Determine version bump
        id: version
        run: |
          # Get current version
          CURRENT_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Current version: $CURRENT_VERSION"

          # Determine next version based on commits or manual input
          if [ -n "${{ inputs.release_type }}" ]; then
            RELEASE_TYPE="${{ inputs.release_type }}"
          else
            # Analyze commits since last tag
            if git log ${CURRENT_VERSION}..HEAD --format=%s | grep -q "^BREAKING CHANGE:\|^feat.*!:"; then
              RELEASE_TYPE="major"
            elif git log ${CURRENT_VERSION}..HEAD --format=%s | grep -q "^feat:"; then
              RELEASE_TYPE="minor"
            else
              RELEASE_TYPE="patch"
            fi
          fi

          # Calculate new version
          IFS='.' read -r -a VERSION_PARTS <<< "${CURRENT_VERSION#v}"
          MAJOR="${VERSION_PARTS[0]}"
          MINOR="${VERSION_PARTS[1]}"
          PATCH="${VERSION_PARTS[2]%%[-+]*}"

          case $RELEASE_TYPE in
            major)
              NEW_VERSION="v$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="v${MAJOR}.$((MINOR + 1)).0"
              ;;
            patch)
              NEW_VERSION="v${MAJOR}.${MINOR}.$((PATCH + 1))"
              ;;
            prerelease)
              NEW_VERSION="v${MAJOR}.${MINOR}.$((PATCH + 1))-${{ inputs.prerelease_id }}.$(date +%Y%m%d%H%M%S)"
              ;;
          esac

          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          # Generate changelog since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            CHANGELOG=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%h)" | grep -E "^- (feat|fix|docs|style|refactor|perf|test|chore):" || echo "No conventional commits found")
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" | head -20)
          fi

          # Save to file for multi-line output
          echo "$CHANGELOG" > changelog.md
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat changelog.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          cat << EOF > release_notes.md
          # Release ${{ steps.version.outputs.new_version }}

          ## What's Changed
          ${{ steps.changelog.outputs.changelog }}

          ## Projects Updated
          $(git diff --name-only ${LAST_TAG}..HEAD | grep -E "^(llm|chat|search|mcp|agent|platform|python-sdk|js-sdk|rust-sdk|go-sdk|candle|node|jin|az2)/" | cut -d'/' -f1 | sort -u | sed 's/^/- /')

          ## Contributors
          $(git log ${LAST_TAG}..HEAD --format="%an" | sort -u | sed 's/^/- @/')

          **Full Changelog**: https://github.com/hanzoai/hanzo/compare/${LAST_TAG}...${{ steps.version.outputs.new_version }}
          EOF

          echo "release_notes<<EOF" >> $GITHUB_OUTPUT
          cat release_notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  test-release:
    runs-on: ubuntu-latest
    needs: prepare-release
    strategy:
      matrix:
        project: [llm, chat, agent, python-sdk, js-sdk]
    steps:
      - uses: actions/checkout@v4

      - name: Run smoke tests for ${{ matrix.project }}
        run: |
          if [ -f "./${{ matrix.project }}/scripts/smoke-test.sh" ]; then
            ./${{ matrix.project }}/scripts/smoke-test.sh
          else
            echo "No smoke tests for ${{ matrix.project }}"
          fi

  create-release:
    runs-on: ubuntu-latest
    needs: [prepare-release, test-release]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Update version files
        run: |
          VERSION="${{ needs.prepare-release.outputs.new_version }}"
          VERSION_NUM="${VERSION#v}"

          # Update version in various files
          find . -name "package.json" -type f -exec sh -c '
            if grep -q "\"version\":" "$1"; then
              sed -i.bak "s/\"version\": \"[^\"]*\"/\"version\": \"'$2'\"/" "$1"
              rm "$1.bak"
            fi
          ' _ {} "$VERSION_NUM" \;

          find . -name "pyproject.toml" -type f -exec sh -c '
            if grep -q "^version = " "$1"; then
              sed -i.bak "s/^version = .*/version = \"'$2'\"/" "$1"
              rm "$1.bak"
            fi
          ' _ {} "$VERSION_NUM" \;

          find . -name "Cargo.toml" -type f -exec sh -c '
            if grep -q "^version = " "$1"; then
              sed -i.bak "s/^version = .*/version = \"'$2'\"/" "$1"
              rm "$1.bak"
            fi
          ' _ {} "$VERSION_NUM" \;

          # Update CHANGELOG.md
          if [ -f "CHANGELOG.md" ]; then
            echo -e "# Changelog\n\n## $VERSION ($(date +%Y-%m-%d))\n\n${{ needs.prepare-release.outputs.changelog }}\n\n$(cat CHANGELOG.md)" > CHANGELOG.md.new
            mv CHANGELOG.md.new CHANGELOG.md
          else
            echo -e "# Changelog\n\n## $VERSION ($(date +%Y-%m-%d))\n\n${{ needs.prepare-release.outputs.changelog }}" > CHANGELOG.md
          fi

      - name: Commit version updates
        run: |
          git add .
          git commit -m "chore(release): ${{ needs.prepare-release.outputs.new_version }}" || echo "No changes to commit"

      - name: Create and push tag
        run: |
          git tag -a ${{ needs.prepare-release.outputs.new_version }} -m "Release ${{ needs.prepare-release.outputs.new_version }}"
          git push origin ${{ needs.prepare-release.outputs.new_version }}
          git push origin HEAD

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.new_version }}
          name: ${{ needs.prepare-release.outputs.new_version }}
          body: ${{ needs.prepare-release.outputs.release_notes }}
          draft: false
          prerelease: ${{ contains(needs.prepare-release.outputs.new_version, '-') }}
          generate_release_notes: true

  publish-packages:
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      matrix:
        include:
          - project: python-sdk
            type: python
          - project: js-sdk
            type: npm
          - project: mcp
            type: npm
          - project: rust-sdk
            type: cargo
          - project: go-sdk
            type: go
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.new_version }}

      - name: Setup environment for ${{ matrix.type }}
        run: |
          case "${{ matrix.type }}" in
            python)
              curl -LsSf https://astral.sh/uv/install.sh | sh
              echo "$HOME/.local/bin" >> $GITHUB_PATH
              ;;
            npm)
              npm config set //registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}
              ;;
            cargo)
              echo "CARGO_REGISTRY_TOKEN=${{ secrets.CARGO_REGISTRY_TOKEN }}" >> $GITHUB_ENV
              ;;
            go)
              echo "GOPROXY=proxy.golang.org" >> $GITHUB_ENV
              ;;
          esac

      - name: Publish ${{ matrix.project }}
        run: |
          cd ${{ matrix.project }}

          case "${{ matrix.type }}" in
            python)
              uv build
              uv publish --token ${{ secrets.PYPI_TOKEN }}
              ;;
            npm)
              npm publish --access public
              ;;
            cargo)
              cargo publish
              ;;
            go)
              GOPROXY=proxy.golang.org go list -m github.com/hanzoai/${{ matrix.project }}@${{ needs.prepare-release.outputs.new_version }}
              ;;
          esac

  build-docker-images:
    runs-on: ubuntu-latest
    needs: [prepare-release, create-release]
    strategy:
      matrix:
        service: [llm-gateway, chat, search, platform, agent, mcp]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.new_version }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registries
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u hanzoai --password-stdin

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/hanzoai/${{ matrix.service }}:${{ needs.prepare-release.outputs.new_version }}
            ghcr.io/hanzoai/${{ matrix.service }}:latest
            hanzoai/${{ matrix.service }}:${{ needs.prepare-release.outputs.new_version }}
            hanzoai/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.prepare-release.outputs.new_version }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}

  update-documentation:
    runs-on: ubuntu-latest
    needs: [prepare-release, create-release]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.new_version }}

      - name: Update API documentation
        run: |
          # Generate API docs for each project
          for project in llm chat search platform agent mcp python-sdk js-sdk; do
            if [ -f "./$project/scripts/generate-docs.sh" ]; then
              ./$project/scripts/generate-docs.sh
            fi
          done

      - name: Deploy documentation
        run: |
          # Deploy to GitHub Pages or documentation site
          echo "Deploying documentation for version ${{ needs.prepare-release.outputs.new_version }}"
          # Add actual deployment commands here

  notify:
    runs-on: ubuntu-latest
    needs: [create-release, publish-packages, build-docker-images]
    if: always()
    steps:
      - name: Send release notification
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              attachments: [{
                color: '${{ needs.create-release.result == 'success' && 'good' || 'danger' }}',
                title: 'Release ${{ needs.prepare-release.outputs.new_version }} ${{ needs.create-release.result }}',
                fields: [
                  { title: 'Version', value: '${{ needs.prepare-release.outputs.new_version }}', short: true },
                  { title: 'Type', value: '${{ inputs.release_type || 'auto' }}', short: true },
                  { title: 'Released by', value: '${{ github.actor }}', short: true },
                  { title: 'Status', value: '${{ needs.create-release.result }}', short: true }
                ],
                actions: [
                  {
                    type: 'button',
                    text: 'View Release',
                    url: 'https://github.com/hanzoai/hanzo/releases/tag/${{ needs.prepare-release.outputs.new_version }}'
                  }
                ]
              }]
            }
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}