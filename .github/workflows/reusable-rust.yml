name: Reusable Rust CI/CD

on:
  workflow_call:
    inputs:
      rust-version:
        description: 'Rust version to use'
        required: false
        type: string
        default: 'stable'
      working-directory:
        description: 'Working directory for the job'
        required: true
        type: string
      run-tests:
        description: 'Whether to run tests'
        required: false
        type: boolean
        default: true
      build-docker:
        description: 'Whether to build Docker image'
        required: false
        type: boolean
        default: true
      package-name:
        description: 'Package name for deployment'
        required: false
        type: string
      features:
        description: 'Cargo features to enable'
        required: false
        type: string
        default: ''
      use-mold:
        description: 'Use mold linker for faster builds'
        required: false
        type: boolean
        default: true
    secrets:
      CARGO_REGISTRY_TOKEN:
        required: false

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-version }}
          components: rustfmt, clippy

      - name: Install mold linker
        if: inputs.use-mold
        run: |
          sudo apt-get update
          sudo apt-get install -y mold
          echo "[target.x86_64-unknown-linux-gnu]" >> ~/.cargo/config.toml
          echo "linker = \"clang\"" >> ~/.cargo/config.toml
          echo "rustflags = [\"-C\", \"link-arg=-fuse-ld=mold\"]" >> ~/.cargo/config.toml

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Install cargo-machete
        run: cargo install cargo-machete

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Security audit
        run: cargo audit

      - name: Check dependencies
        run: |
          cargo deny check || true
          cargo machete || true

      - name: Check documentation
        run: cargo doc --no-deps --all-features

  test:
    runs-on: ubuntu-latest
    if: inputs.run-tests
    needs: quality
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    strategy:
      matrix:
        rust: [stable, beta]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Install mold linker
        if: inputs.use-mold
        run: |
          sudo apt-get update
          sudo apt-get install -y mold
          echo "[target.x86_64-unknown-linux-gnu]" >> ~/.cargo/config.toml
          echo "linker = \"clang\"" >> ~/.cargo/config.toml
          echo "rustflags = [\"-C\", \"link-arg=-fuse-ld=mold\"]" >> ~/.cargo/config.toml

      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-test-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: |
          if [ -n "${{ inputs.features }}" ]; then
            cargo nextest run --features "${{ inputs.features }}"
          else
            cargo nextest run --all-features
          fi

      - name: Run doc tests
        run: cargo test --doc --all-features

      - name: Generate code coverage
        run: |
          cargo llvm-cov nextest --all-features --lcov --output-path lcov.info
          cargo llvm-cov report --html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ inputs.working-directory }}/lcov.info
          flags: ${{ inputs.package-name || 'rust' }}
          name: ${{ inputs.package-name || 'rust' }}-${{ matrix.rust }}

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ inputs.package-name || 'rust' }}-${{ matrix.rust }}
          path: ${{ inputs.working-directory }}/target/llvm-cov/html/
          retention-days: 30

  benchmark:
    runs-on: ubuntu-latest
    needs: quality
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install criterion
        run: cargo install cargo-criterion

      - name: Install mold linker
        if: inputs.use-mold
        run: |
          sudo apt-get update
          sudo apt-get install -y mold
          echo "[target.x86_64-unknown-linux-gnu]" >> ~/.cargo/config.toml
          echo "linker = \"clang\"" >> ~/.cargo/config.toml
          echo "rustflags = [\"-C\", \"link-arg=-fuse-ld=mold\"]" >> ~/.cargo/config.toml

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: Run benchmarks
        run: |
          cargo criterion --output-format bencher | tee output.txt || true

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Rust Benchmark
          tool: 'cargo'
          output-file-path: ${{ inputs.working-directory }}/output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true

  miri:
    runs-on: ubuntu-latest
    needs: quality
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly and miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Setup miri
        run: cargo miri setup

      - name: Run miri tests
        run: cargo miri test || true

  fuzz:
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[fuzz]')
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Run fuzz tests
        run: |
          if [ -d "fuzz" ]; then
            cargo fuzz run fuzz_target_1 -- -max_total_time=60 || true
          fi

  build:
    runs-on: ubuntu-latest
    needs: [quality, test]
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-pc-windows-gnu
          - x86_64-apple-darwin
          - aarch64-apple-darwin
          - wasm32-unknown-unknown
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target != 'x86_64-unknown-linux-gnu'
        uses: taiki-e/install-action@cross

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-build-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build for target
        run: |
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ]; then
            cargo build --release --target ${{ matrix.target }}
          else
            cross build --release --target ${{ matrix.target }}
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ inputs.package-name || 'rust' }}-${{ matrix.target }}
          path: |
            ${{ inputs.working-directory }}/target/${{ matrix.target }}/release/*
            !${{ inputs.working-directory }}/target/${{ matrix.target }}/release/*.d
            !${{ inputs.working-directory }}/target/${{ matrix.target }}/release/deps/
            !${{ inputs.working-directory }}/target/${{ matrix.target }}/release/build/
          retention-days: 30

  docker:
    runs-on: ubuntu-latest
    if: inputs.build-docker
    needs: [build]
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/hanzoai/${{ inputs.package-name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.working-directory }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: runtime
          build-args: |
            RUST_VERSION=${{ inputs.rust-version }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/hanzoai/${{ inputs.package-name }}:${{ steps.meta.outputs.version }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  publish-crate:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [quality, test, build]
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish --dry-run
          cargo publish