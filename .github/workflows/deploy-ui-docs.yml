name: Deploy UI Documentation to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'ui/**'
      - 'pkg/**'
      - 'app/**'
      - '.github/workflows/deploy-ui-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Timeout to prevent billing issues
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Minimal depth to reduce checkout time
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      # Build documentation site from markdown
      - name: Build documentation site
        run: |
          # Make build script executable and run it
          chmod +x build-docs.sh
          ./build-docs.sh

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs-output

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    # Timeout to prevent billing issues
    timeout-minutes: 10
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4